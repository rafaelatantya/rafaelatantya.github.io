<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPB Course Explorer • Island Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <style>
        /* --- THEME CONFIG --- */
        :root {
            /* WARNA PASIR REALISTIS (Cream/Coklat Muda) - Fixed Color */
            --sand-main: #e6c288;
            --sand-dark: #cba366;
            
            /* Warna Kartu (Harus Gelap agar Adaptive Text bekerja sempurna) */
            --card-base: #0f172a; /* Deep Ocean Blue */
            
            /* Warna Aksen */
            --accent-primary: #22d3ee; /* Cyan Neon */
            --accent-secondary: #f97316; /* Orange */
            
            /* Glass border */
            --glass-border: rgba(230, 194, 136, 0.3);
        }

        /* Mode Siang/Malam hanya mengubah Background Dunia & Langit */
        :root[data-theme="light"] {
            --bg-world: #fff7ed;
            --sky-gradient: linear-gradient(to bottom, #bae6fd, #fff7ed);
            --sun-color: #fbbf24;
        }
        :root[data-theme="dark"] {
            --bg-world: #020617; 
            --sky-gradient: linear-gradient(to bottom, #0f172a, #020617);
            --sun-color: #fcd34d;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-world); 
            color: #ffffff;
            overflow-x: hidden; 
            transition: background-color 0.8s ease;
        }
        .font-tech { font-family: 'Space Grotesk', sans-serif; }

        /* --- THE MAGIC CARD (ISLAND X DUNE HYBRID) --- */
        .island-card {
            background-color: var(--card-base); /* Gelap seperti dasar laut */
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden; 
            isolation: isolate; /* Kunci untuk blend mode */
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
        }
        
        .island-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(6, 182, 212, 0.2);
            border-color: var(--accent-primary);
        }

        /* --- ADAPTIVE TEXT LAYER --- */
        .content-layer {
            position: relative;
            z-index: 20; 
            color: #ffffff; /* Teks Putih */
            mix-blend-mode: difference; /* JIKA KENA PASIR (TERANG), TEKS JADI GELAP */
        }

        /* --- FALLING SAND (UNEVEN FLOW) --- */
        .falling-sand {
            position: absolute;
            inset: -50% 0 0 0;
            height: 200%;
            width: 100%;
            z-index: 1;
            pointer-events: none;
            /* Texture Noise untuk butiran */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
            background-color: var(--sand-dark);
            /* Masking Uneven */
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            opacity: 0;
            animation: sandPour 12s infinite linear;
        }

        /* --- RISING SAND PILE (UNEVEN / BERGELOMBANG) --- */
        .sand-pile {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 25%;
            background: var(--sand-main);
            z-index: 5;
            /* Tekstur Butiran */
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='2' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.2'/%3E%3C/svg%3E"),
                linear-gradient(to bottom, var(--sand-main), var(--sand-dark));
            animation: pileRise 12s infinite ease-in-out;
        }

        /* UNEVEN TOP EDGE (Lengkungan Pasir) */
        .sand-pile::before, .sand-pile::after {
            content: "";
            position: absolute;
            top: -15px; 
            left: 0; width: 200%; height: 35px;
            background: inherit;
            border-radius: 50%;
            animation: waveRotate 8s infinite linear;
        }
        .sand-pile::after {
            top: -20px; width: 220%; opacity: 0.8;
            animation-duration: 12s; animation-direction: reverse; left: -50%;
        }

        /* --- ANIMATIONS --- */
        @keyframes sandPour {
            0% { transform: translateY(-20%); opacity: 0; }
            10% { opacity: 0.5; } 
            60% { transform: translateY(10%); opacity: 0.5; } 
            70% { opacity: 0; } 
            100% { transform: translateY(20%); opacity: 0; }
        }
        @keyframes pileRise {
            0% { height: 25%; }
            10% { height: 25%; }
            60% { height: 80%; } /* Naik Tinggi (Uneven) */
            75% { height: 80%; } 
            90% { height: 25%; } /* Turun */
            100% { height: 25%; }
        }
        @keyframes waveRotate {
            0% { transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(-20%) rotate(2deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        /* --- SCENERY & LIQUID --- */
        .scenery-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -10; overflow: hidden; background: var(--sky-gradient); transition: background 1s; }
        .celestial-body {
            position: absolute; top: 50px; right: 50px; width: 80px; height: 80px;
            border-radius: 50%; background: var(--sun-color);
            box-shadow: 0 0 60px var(--sun-color); transition: all 1s;
        }
        .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.8; animation: floatCloud 60s linear infinite; filter: blur(5px); }
        @keyframes floatCloud { from { transform: translateX(-200px); } to { transform: translateX(100vw); } }
        
        .wave-layer { position: absolute; bottom: 0; width: 200%; height: 150px; background: rgba(6, 182, 212, 0.2); mask: url("data:image/svg+xml,%3Csvg viewBox='0 0 800 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 50 Q 200 100 400 50 T 800 50 V 100 H 0 Z' fill='black'/%3E%3C/svg%3E"); -webkit-mask: url("data:image/svg+xml,%3Csvg viewBox='0 0 800 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 50 Q 200 100 400 50 T 800 50 V 100 H 0 Z' fill='black'/%3E%3C/svg%3E"); -webkit-mask-size: 50% 100%; animation: waveSlide 20s linear infinite; }
        .wave-layer.front { height: 120px; background: rgba(6, 182, 212, 0.4); animation-duration: 15s; animation-direction: reverse; bottom: -10px; }
        @keyframes waveSlide { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* Liquid FX */
        #liquidLayer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; display: none; overflow: hidden; }
        .liquid-blob { position: absolute; border-radius: 50%; background: linear-gradient(135deg, var(--accent-primary), #3b82f6); transform: translate(-50%, -50%) scale(0); opacity: 1; }
        .animate-liquid-fill { animation: liquidFill 0.8s cubic-bezier(0.7, 0, 0.3, 1) forwards; }
        @keyframes liquidFill { 0% { transform: translate(-50%, -50%) scale(0); } 100% { transform: translate(-50%, -50%) scale(4); border-radius: 50%; } }

        /* --- UI ELEMENTS --- */
        .chart-opt-btn { font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: bold; border: 1px solid var(--glass-border); color: #94a3b8; transition: all 0.2s; background: rgba(0,0,0,0.3); }
        .chart-opt-btn:hover, .chart-opt-btn.active { background: var(--accent-primary); color: black; border-color: transparent; }
        
        .progress-bar-container { width: 100%; background: rgba(255,255,255,0.1); border-radius: 999px; height: 16px; position: relative; overflow: visible; border: 1px solid var(--accent-primary); }
        .progress-bar-fill { height: 100%; background: var(--accent-primary); border-radius: 999px; width: 0%; position: relative; transition: width 0.3s; box-shadow: 0 0 10px var(--accent-primary); }
        .surfer-icon { position: absolute; right: -15px; top: -18px; font-size: 32px; animation: surfBob 1s infinite alternate ease-in-out; }
        @keyframes surfBob { from { transform: translateY(0) rotate(5deg); } to { transform: translateY(-5px) rotate(-5deg); } }

        .animate-enter { animation: enter 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(30px); }
        @keyframes enter { to { opacity: 1; transform: translateY(0); } }
        
        .toggle-checkbox:checked { right: 0; border-color: var(--accent-primary); }
        .toggle-checkbox:checked + .toggle-label { background-color: var(--accent-primary); }
        
        /* Glass Input */
        .glass-input { background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border); color: white; }
        .glass-input:focus { border-color: var(--accent-primary); outline: none; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--sand-main); }
    </style>
</head>
<body class="selection:bg-cyan-500/30 selection:text-cyan-200">

    <div class="scenery-container">
        <div class="celestial-body"></div>
        <div class="cloud" style="width: 200px; height: 60px; top: 10%; left: -200px;"></div>
        <div class="cloud" style="width: 300px; height: 80px; top: 20%; left: -400px; animation-duration: 80s;"></div>

        <div class="wave-layer front"></div>
    </div>

    <div id="liquidLayer"></div>

    <div id="initLoader" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-6 bg-[#0f172a]/95 backdrop-blur-xl transition-opacity duration-700">
        <div class="w-full max-w-lg text-center relative z-10">
            <h2 class="text-4xl md:text-5xl font-black font-tech tracking-tighter mb-4 text-white drop-shadow-[0_0_15px_rgba(34,211,238,0.5)]">IPB <span style="color: var(--accent-primary)">COURSE ISLAND</span></h2>
            <p id="loadStatus" class="text-sm font-bold tracking-widest uppercase mb-10 text-gray-400 animate-pulse">Menyiapkan Ombak...</p>
            
            <div class="flex justify-between items-end mb-2 px-2">
                <div class="text-[var(--accent-primary)] text-xs font-bold tracking-wider uppercase">KECEPATAN SELANCAR</div>

    <div id="mainApp" class="hidden opacity-0 transition-opacity duration-1000 min-h-screen flex flex-col">
        
        <div class="sticky top-0 z-30 pt-4 px-4 pb-2">
            <div class="max-w-7xl mx-auto bg-[#0f172a]/80 rounded-full px-6 py-3 shadow-lg border border-[var(--glass-border)] flex justify-between items-center backdrop-blur-md">
                <div class="flex items-center gap-3 cursor-pointer group" onclick="window.location.reload()">

                        <i class="fa-solid fa-water"></i>
                    </div>
                    <div class="hidden sm:block">

                </div>

                    <div class="flex items-center gap-2 bg-black/30 px-3 py-1.5 rounded-full border border-white/10">

                        <div class="relative inline-block w-8 align-middle select-none">
                            <input type="checkbox" id="langToggle" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-2 appearance-none cursor-pointer border-slate-300"/>
                            <label for="langToggle" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-500 cursor-pointer"></label>
                        </div>
                        <span class="text-[10px] font-bold text-gray-400">EN</span>
                    </div>
                    <button onclick="window.toggleTheme()" class="w-10 h-10 rounded-full bg-black/30 border border-white/10 text-white flex items-center justify-center hover:scale-110 transition shadow-sm">
                        <i id="themeIcon" class="fa-solid fa-sun text-[var(--accent-secondary)]"></i>
                    </button>
                </div>

        </div>

        <div class="flex-shrink-0 px-4 py-10 lg:py-16 relative z-10">
            <div class="max-w-4xl mx-auto text-center mb-10">
                <h2 class="text-4xl md:text-6xl font-black mb-4 font-tech text-[var(--text-main)] drop-shadow-sm leading-tight animate-enter">
                    <span data-i18n="headerSubtitle">Jelajahi</span> <span style="color: var(--accent-primary)">Kepulauan</span> Data
                </h2>
                <p class="text-[var(--text-main)] opacity-70 font-bold text-lg max-w-lg mx-auto animate-enter" style="animation-delay: 0.1s" data-i18n="headerDesc">
                    Temukan <span id="totalDataBadge" class="bg-[var(--glass-border)] px-2 py-0.5 rounded text-[var(--accent-primary)] border border-[var(--glass-border)]">0</span> mata kuliah di lautan data IPB.
                </p>
            </div>

            <div class="max-w-4xl mx-auto relative group animate-enter" style="animation-delay: 0.2s">
                <div class="relative bg-[#0f172a]/80 backdrop-blur-md p-6 rounded-[2.5rem] border border-[var(--glass-border)] shadow-2xl">
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                        <div class="md:col-span-3">
                            <label class="block text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-wider" data-i18n="lblMode">MODE</label>
                            <div class="relative">
                                <select id="searchMode" onchange="updatePlaceholder()" class="w-full glass-input rounded-xl px-4 py-3 font-bold appearance-none cursor-pointer transition shadow-sm">
                                    <option value="ALL">✨ Smart Search</option>
                                    <option value="NAME">🔤 Nama</option>
                                    <option value="CODE">🔖 Kode</option>
                                    <option value="DESC">📝 Deskripsi</option>
                                    <option value="ID_MK">🆔 ID Matkul</option>
                                </select>
                                <i class="fa-solid fa-chevron-down absolute right-4 top-4 text-gray-500 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                        <div class="md:col-span-6">
                            <label class="block text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-wider" data-i18n="lblKeyword">KATA KUNCI</label>
                            <div class="relative">
                                <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-500"></i>
                                <input type="text" id="searchInput" class="w-full glass-input rounded-xl pl-10 pr-4 py-3 font-bold placeholder-gray-600 shadow-sm transition" placeholder="..." onkeydown="if(event.key === 'Enter') handleSearch()">
                            </div>
                        </div>
                        <div class="md:col-span-3 flex items-end">
                            <button id="searchBtn" onclick="handleSearch()" class="w-full bg-gradient-to-r from-[var(--accent-primary)] to-blue-500 text-white font-tech font-bold py-3.5 rounded-xl text-lg flex items-center justify-center gap-2 group/btn shadow-lg hover:shadow-[var(--accent-primary)]/50 transition-all active:scale-95">
                                <span class="relative z-10" data-i18n="btnSearch">CARI</span> 
                                <i class="fa-solid fa-water relative z-10 group-hover/btn:animate-bounce"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-white/10 flex items-center gap-3">
                        <span class="text-[10px] font-bold text-gray-400 shrink-0" data-i18n="lblLevel">JENJANG:</span>
                        <select id="strataSelect" class="bg-black/30 border border-white/10 rounded-lg px-3 py-1 text-xs text-white font-bold outline-none cursor-pointer">
                            <option value="ALL">Semua</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 px-4 pb-20 max-w-7xl mx-auto w-full">
            <div id="resultsContainer" class="grid grid-cols-1 gap-6 w-full">
                <div class="text-center py-20 opacity-60">
                    <div class="text-8xl mb-6 animate-bounce" style="animation-duration: 3s">🏝️</div>
                    <p class="font-tech text-xl text-[var(--text-main)]" data-i18n="emptyState">Pantai masih sepi. Mulai pencarian!</p>
                </div>
            </div>
            <button id="loadMoreBtn" onclick="loadMore()" class="hidden w-full max-w-md mx-auto mt-12 py-4 bg-[#0f172a] rounded-2xl font-bold hover:bg-black/50 transition-all active:scale-95 shadow-lg tracking-widest uppercase text-sm flex items-center justify-center gap-3 font-tech text-[var(--accent-primary)] border border-[var(--glass-border)]">
                <span data-i18n="btnMore">MUAT LEBIH BANYAK</span> <i class="fa-solid fa-chevron-down animate-bounce"></i>
            </button>
        </div>

        <footer class="text-center py-8 border-t border-[var(--glass-border)] mt-auto bg-[#0f172a]/50 backdrop-blur-md">
            <p class="text-gray-400 font-bold text-xs">
                Made with <i class="fa-solid fa-heart text-rose-500 animate-pulse mx-1"></i> by 
                <a href="https://instagram.com/atantya" class="text-[var(--accent-primary)] hover:underline">@Atantya</a> & 
                <a href="https://instagram.com/projectsbyatantya" class="text-[var(--accent-primary)] hover:underline">@ProjectsByAtantya</a>
            </p>
        </footer>
    </div>

    <script>
        // === CONFIG ===
        const TOTAL_FILES = 15;
        const FILE_PREFIX = '../data/course-island/db_matkul_';
        
        // === STATE ===
        let ALL_DATA = [];
        let searchResults = [];
        let currentPage = 1;
        const LIMIT = 20;
        let currentLang = 'id';
        const chartStore = {}; 

        // === I18N ===
        const i18n = {
            id: {
                headerSubtitle: "Jelajahi",
                headerDesc: "Temukan mata kuliah di kepulauan data IPB.",
                lblMode: "MODE",
                lblKeyword: "KATA KUNCI",
                lblLevel: "JENJANG:",
                btnSearch: "CARI",
                btnMore: "MUAT LEBIH BANYAK",
                emptyState: "Pantai masih sepi. Mulai pencarian!",
                notFound: "Hanya menemukan kerang kosong. Coba lagi!",
                cardSch: "Jadwal",
                cardDetail: "Detail",
                phAll: "Cari Matkul, Kode, atau Deskripsi..."
            },
            en: {
                headerSubtitle: "Explore",
                headerDesc: "Discover courses in the IPB data archipelago.",
                lblMode: "MODE",
                lblKeyword: "KEYWORDS",
                lblLevel: "LEVEL:",
                btnSearch: "SEARCH",
                btnMore: "LOAD MORE",
                emptyState: "The beach is quiet. Start searching!",
                notFound: "Found only empty shells. Try again!",
                cardSch: "Schedule",
                cardDetail: "Detail",
                phAll: "Search Course, Code, or Syllabus..."
            }
        };

        // === THEME ENGINE ---
        const themeIcon = document.getElementById('themeIcon');
        let currentTheme = localStorage.getItem('theme') || 'dark';
        window.toggleTheme = function() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            themeIcon.className = currentTheme === 'dark' ? 'fa-solid fa-sun text-[var(--accent-secondary)]' : 'fa-solid fa-moon text-[var(--accent-secondary)]';
            localStorage.setItem('theme', currentTheme);
            Object.keys(chartStore).forEach(mkId => {
                const wrapper = document.getElementById(`chart-wrapper-${mkId}`);
                if(wrapper && !wrapper.closest('.hidden')) {
                    const activeType = chartStore[mkId].config.type;
                    loadChartData(mkId, activeType);
                }
            });
        }
        document.documentElement.setAttribute('data-theme', currentTheme);
        themeIcon.className = currentTheme === 'dark' ? 'fa-solid fa-sun text-[var(--accent-secondary)]' : 'fa-solid fa-moon text-[var(--accent-secondary)]';

        // --- LIQUID EXPLOSION ---
        function triggerLiquidExplosion(callback) {
            const overlay = document.getElementById('liquidLayer');
            const btn = document.getElementById('searchBtn');
            const rect = btn.getBoundingClientRect();
            overlay.style.display = 'block'; overlay.innerHTML = ''; 
            const blob = document.createElement('div');
            blob.className = 'liquid-blob animate-liquid-fill';
            blob.style.left = (rect.left + rect.width/2) + 'px';
            blob.style.top = (rect.top + rect.height/2) + 'px';
            blob.style.width = Math.max(window.innerWidth, window.innerHeight) + 'px';
            blob.style.height = blob.style.width;
            overlay.appendChild(blob);
            setTimeout(() => {
                if(callback) callback();
                blob.style.opacity = '0'; blob.style.transition = 'opacity 0.5s';
                setTimeout(() => { overlay.style.display = 'none'; overlay.innerHTML = ''; }, 1500);
            }, 600);
        }

        // --- UI ---
        document.getElementById('langToggle').addEventListener('change', (e) => {
            currentLang = e.target.checked ? 'en' : 'id';
            updateUI();
        });

        function updateUI() {
            const t = i18n[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(t[key]) el.innerHTML = t[key];
            });
            document.getElementById('searchInput').placeholder = t.phAll;
        }

        function updatePlaceholder() {
            const mode = document.getElementById('searchMode').value;
            const input = document.getElementById('searchInput');
            if(mode === 'ID_MK') input.placeholder = "203...";
            else if(mode === 'CODE') input.placeholder = "KOM...";
            else input.placeholder = i18n[currentLang].phAll;
        }

        // --- LOADER ---
        async function loadDatabase() {
            const startTime = Date.now();
            let totalBytes = 0;
            for (let i = 1; i <= TOTAL_FILES; i++) {
                const fileName = `${FILE_PREFIX}${i}.json`;
                try {
                    const response = await fetch(fileName);
                    if (!response.ok) throw new Error("HTTP Error");
                    const blob = await response.blob();
                    totalBytes += blob.size;
                    const text = await blob.text();
                    const json = JSON.parse(text);
                    for(const item of json) {
                        const finalItem = item.Details ? item.Details : item;
                        if(finalItem) ALL_DATA.push(finalItem);
                    }
                    const progress = (i / TOTAL_FILES) * 100;
                    document.getElementById('initProgressBar').style.width = `${progress}%`;
                    document.getElementById('percentText').innerText = `${Math.round(progress)}%`;
                    document.getElementById('filesCount').innerText = `${i}/15`;
                    const elapsed = (Date.now() - startTime) / 1000;
                    const speed = (totalBytes / 1024) / elapsed; 
                    document.getElementById('downloadSpeed').innerText = `${Math.round(speed)} KB/s`;
                } catch (err) { console.error(err); }
            }
            setTimeout(() => {
                const loader = document.getElementById('initLoader');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    document.getElementById('mainApp').classList.remove('hidden');
                    setTimeout(() => document.getElementById('mainApp').style.opacity = '1', 100);
                    initApp();
                }, 700);
            }, 500);
        }

        function initApp() {
            document.getElementById('totalDataBadge').innerText = ALL_DATA.length.toLocaleString();
            const strataSet = new Set(ALL_DATA.map(c => c.Strata).filter(Boolean));
            const select = document.getElementById('strataSelect');
            [...strataSet].sort().forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.innerText = s;
                select.appendChild(opt);
            });
        }

        // --- SEARCH ---
        function handleSearch() {
            const btn = document.getElementById('searchBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i>`;
            triggerLiquidExplosion(() => {
                doSearchLogic();
                btn.innerHTML = originalHTML;
            });
        }

        function doSearchLogic() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const mode = document.getElementById('searchMode').value;
            const strata = document.getElementById('strataSelect').value;
            currentPage = 1;
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';

            searchResults = ALL_DATA.filter(item => {
                if(strata !== 'ALL' && item.Strata !== strata) return false;
                if(!keyword) return true;
                switch(mode) {
                    case 'NAME': return item.Nama && item.Nama.toLowerCase().includes(keyword);
                    case 'CODE': return item.Kode && item.Kode.toLowerCase().includes(keyword);
                    case 'DESC': return item.Deskripsi && item.Deskripsi.toLowerCase().includes(keyword);
                    case 'ID_MK': return String(item.MataKuliahId).includes(keyword);
                    default: return (item.Nama && item.Nama.toLowerCase().includes(keyword)) ||
                               (item.Kode && item.Kode.toLowerCase().includes(keyword)) ||
                               (item.Deskripsi && item.Deskripsi.toLowerCase().includes(keyword)) ||
                               String(item.MataKuliahId).includes(keyword) ||
                               (item.ListJadwal && item.ListJadwal.some(j => String(j.JadwalKuliahId).includes(keyword)));
                }
            });

            if(searchResults.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 bg-[#0f172a]/50 rounded-3xl border border-dashed border-[var(--glass-border)]">
                        <i class="fa-solid fa-fish text-6xl text-[var(--accent-primary)] mb-4 animate-bounce"></i>
                        <p class="font-bold text-gray-400">${i18n[currentLang].notFound}</p>
                    </div>`;
                document.getElementById('loadMoreBtn').classList.add('hidden');
            } else {
                renderPage();
            }
        }

        function renderPage() {
            const container = document.getElementById('resultsContainer');
            const start = (currentPage - 1) * LIMIT;
            const end = start + LIMIT;
            const slice = searchResults.slice(start, end);
            const t = i18n[currentLang];

            slice.forEach((item, index) => {
                const delay = index * 0.05;
                let strataColor = 'bg-gray-800 text-gray-300';
                if(item.Strata === 'S1') strataColor = 'bg-cyan-900/50 text-cyan-200 border-cyan-800';
                if(item.Strata === 'S2') strataColor = 'bg-rose-900/50 text-rose-200 border-rose-800';
                if(item.Strata === 'D3') strataColor = 'bg-orange-900/50 text-orange-200 border-orange-800';

                const card = document.createElement('div');
                card.className = 'island-card rounded-[2rem] overflow-hidden animate-enter';
                card.style.animationDelay = `${delay}s`;
                
                card.innerHTML = `
                    <div class="falling-sand"></div>
                    <div class="sand-pile"></div>
                    
                    <div class="p-6 md:p-8 relative z-20 content-layer">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <div class="flex gap-2 mb-2">
                                    <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider border ${strataColor}">${item.Strata || '-'}</span>
                                    <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider border border-white/20">ID: ${item.MataKuliahId}</span>
                                </div>
                                <h3 class="text-2xl font-black font-tech leading-tight mb-1">${item.Nama}</h3>
                                <div class="flex items-center gap-2 font-mono text-sm font-bold opacity-80">
                                    <i class="fa-solid fa-tag"></i> ${item.Kode} 
                                    <span class="opacity-50">|</span> 
                                    <span>${item.SksNama}</span>
                                </div>
                            </div>
                            <div class="flex flex-col gap-2 shrink-0">
                                <button onclick="toggleInfo('${item.MataKuliahId}')" class="px-4 py-2 rounded-xl border border-white/30 hover:bg-white hover:text-black transition flex items-center gap-2 shadow-sm text-xs font-bold uppercase tracking-wider">
                                    <i class="fa-solid fa-circle-info text-lg"></i> ${t.cardDetail}
                                </button>
                                <button onclick="toggleSection('jadwal-${item.MataKuliahId}')" class="px-4 py-2 rounded-xl border border-white/30 hover:bg-white hover:text-black transition flex items-center gap-2 shadow-sm text-xs font-bold uppercase tracking-wider">
                                    <i class="fa-solid fa-calendar-days text-lg"></i> ${t.cardSch}
                                </button>
                            </div>
                        </div>

                        <div id="detail-${item.MataKuliahId}" class="hidden mt-4 bg-black/20 rounded-2xl p-4 border border-white/10 text-sm">
                            <div class="grid md:grid-cols-2 gap-4">
                                <div>
                                    <h4 class="font-bold text-xs uppercase mb-2 opacity-60">Deskripsi</h4>
                                    <div class="max-h-48 overflow-y-auto opacity-90 leading-relaxed custom-scrollbar bg-black/20 p-3 rounded-xl border border-white/5">
                                        ${item.Deskripsi || '<i class="opacity-50">Tidak ada deskripsi.</i>'}
                                    </div>
                                </div>
                                <div class="flex flex-col">
                                    <div class="flex justify-between items-center mb-2">
                                        <h4 class="font-bold text-xs uppercase opacity-60">Statistik Nilai</h4>
                                        <div class="flex gap-1" id="chart-opts-${item.MataKuliahId}">
                                            <button class="chart-opt-btn active" onclick="loadChartData('${item.MataKuliahId}', 'bar', this)">BAR</button>
                                            <button class="chart-opt-btn" onclick="loadChartData('${item.MataKuliahId}', 'doughnut', this)">DONUT</button>
                                            <button class="chart-opt-btn" onclick="loadChartData('${item.MataKuliahId}', 'horizontal', this)">100%</button>
                                        </div>
                                    </div>
                                    <div class="relative flex-1 bg-black/20 rounded-xl border border-white/5 flex items-center justify-center overflow-hidden min-h-[200px]">
                                        <div id="chart-wrapper-${item.MataKuliahId}" class="w-full h-full p-2 flex items-center justify-center">
                                            <span class="text-xs opacity-50 animate-pulse">Menghubungkan ke Satelit...</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div id="jadwal-${item.MataKuliahId}" class="hidden mt-4 space-y-2">
                            ${(item.ListJadwal && item.ListJadwal.length > 0) ? item.ListJadwal.map(j => `
                                <div class="flex items-center gap-3 bg-black/20 p-3 rounded-xl border border-white/10 hover:border-white/40 transition group">
                                    <div class="w-10 h-10 rounded-lg bg-black/30 flex items-center justify-center font-bold border border-white/10 text-xs shrink-0 shadow-sm">
                                        ${j.KelasParalel}
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="text-[10px] font-bold opacity-60 uppercase tracking-wide flex items-center gap-2">
                                            <span class="bg-white/10 px-1.5 rounded">${j.JenisKelas}</span> #${j.JadwalKuliahId}
                                        </div>
                                        <div class="text-sm font-bold truncate mt-0.5">
                                            ${j.Jadwal.join(', ')}
                                        </div>
                                    </div>
                                </div>
                            `).join('') : `<div class="p-3 text-center text-xs italic opacity-50 bg-black/20 rounded-xl">Jadwal Kosong</div>`}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            const btn = document.getElementById('loadMoreBtn');
            if(end >= searchResults.length) btn.classList.add('hidden');
            else {
                btn.classList.remove('hidden');
                btn.querySelector('span').innerText = `${t.btnMore} (${searchResults.length - end})`;
            }
        }

        window.loadMore = function() { currentPage++; renderPage(); }
        window.toggleSection = function(id) { document.getElementById(id).classList.toggle('hidden'); }

        window.toggleInfo = function(mkId) {
            const el = document.getElementById(`detail-${mkId}`);
            el.classList.toggle('hidden');
            if (!el.classList.contains('hidden') && !chartStore[mkId]) {
                loadChartData(mkId, 'bar');
            }
        }

        window.loadChartData = async function(mkId, chartType = 'bar', btnEl = null) {
            if(btnEl) {
                const parent = document.getElementById(`chart-opts-${mkId}`);
                parent.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                btnEl.classList.add('active');
            }

            const wrapper = document.getElementById(`chart-wrapper-${mkId}`);
            
            try {
                if (chartStore[mkId]) chartStore[mkId].destroy();

                let data;
                if(window['data_'+mkId]) {
                    data = window['data_'+mkId];
                } else {
                    const res = await fetch(`https://krs.ipb.ac.id/api/StatistikNilai?mataKuliahId=${mkId}`);
                    if(!res.ok) throw new Error();
                    data = await res.json();
                    const order = ['A', 'AB', 'B', 'BC', 'C', 'D', 'E', 'BL'];
                    data.sort((a,b) => order.indexOf(a.HurufMutu) - order.indexOf(b.HurufMutu));
                    window['data_'+mkId] = data; 
                }

                const labels = data.map(d => d.HurufMutu);
                const values = data.map(d => d.Jumlah);

                wrapper.innerHTML = `<canvas id="canvas-${mkId}"></canvas>`;
                
                const ctx = document.getElementById(`canvas-${mkId}`).getContext('2d');
                
                const sandColors = ['#e6c288', '#d4b483', '#cba366', '#a88854', '#ef4444', '#991b1b', '#7f1d1d', '#57534e'];

                let config = {
                    type: chartType === 'horizontal' ? 'bar' : chartType,
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Mahasiswa',
                            data: values,
                            backgroundColor: chartType === 'doughnut' ? sandColors : labels.map(l => (l === 'A' || l === 'AB') ? '#e6c288' : '#64748b'),
                            borderRadius: 4,
                            borderColor: 'transparent'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { display: false },
                            datalabels: { display: chartType === 'doughnut', color: '#000', formatter: (val) => val > 0 ? val : '' }
                        },
                        indexAxis: chartType === 'horizontal' ? 'y' : 'x',
                        scales: {
                            x: { display: chartType !== 'doughnut', grid: { display: false }, ticks: { color: '#fff' } },
                            y: { display: chartType !== 'doughnut', grid: { display: false }, ticks: { color: '#fff' } }
                        }
                    }
                };

                if (chartType === 'doughnut') {
                    config.options.plugins.legend.display = true;
                    config.options.plugins.legend.position = 'right';
                    config.options.plugins.legend.labels = { color: '#fff', font: { size: 10 }, boxWidth: 10 };
                }

                chartStore[mkId] = new Chart(ctx, config);

            } catch(e) {
                wrapper.innerHTML = `<div class="text-xs text-center text-rose-400 font-bold p-4">Gagal memuat data statistik.<br>Cek koneksi internet.</div>`;
            }
        }

        loadDatabase();
    </script>
</body>
</html>
